services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-linkup_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Porta NÃO publicada no host — o banco só é acessível pela rede interna do compose.
    # (Para depurar localmente, descomente e prefira ligar só ao loopback: "127.0.0.1:5432:5432")
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-linkup_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  search:
    build: ./python-search
    restart: unless-stopped
    # Porta NÃO publicada — acessível apenas pelo app via rede interna (http://search:5001).
    environment:
      HOST: "0.0.0.0"
      PORT: "5001"
      SEARCH_TOKEN: ${SEARCH_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      SEARCH_SERVICE_URL: http://search:5001
      SEARCH_TOKEN: ${SEARCH_TOKEN:-}
    volumes:
      # Uploads (avatares/currículos) persistidos fora da imagem — não somem no redeploy.
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
    command: >
      sh -c "npx sequelize-cli db:migrate && node server.js"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
